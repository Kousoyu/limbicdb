name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Type check
      run: npm run typecheck
    
    - name: Run tests
      run: npm run test
    
    - name: Build
      run: npm run build
    
    - name: Run example smoke tests
      run: |
        # Test that the main README examples work
        echo "Testing semantic-recall example..."
        npx tsx examples/semantic-recall.ts 
        
        echo "Testing durable-semantic-snapshot example..."
        npx tsx examples/durable-semantic-snapshot.ts 
        
        echo "Testing basic usage example..."
        # Create a simple test script based on README basic usage
        cat > test-basic.js << "EOF"
        import { open } from "./dist/index.js"
        import { rmSync } from "node:fs"
        
        async function test() {
          const memory = open("./test-basic.limbic")
          try {
            await memory.remember("User is allergic to nuts")
            await memory.remember("Project deadline is Friday")
            
            const result = await memory.recall("allergies")
            console.log("Basic test passed:", result.memories.length > 0)
          } finally {
            await memory.close()
            // Clean up test file
            try { rmSync("./test-basic.limbic", { force: true }) } catch {}
          }
        }
        
        test().catch(err => {
          console.error("Basic test failed:", err)
          process.exit(1)
        })
        EOF
        node test-basic.js
    
    - name: Verify package
      run: npm run verify
    
    - name: Smoke test npm package
      run: npm run smoketest
  
  test-runtime-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Build and pack
      run: |
        npm ci
        npm run build
        npm pack
    
    - name: Test packaged tarball
      run: |
        # Create clean environment
        mkdir -p /tmp/test-runtime
        cd /tmp/test-runtime
        npm init -y
        
        # Install the tarball (from workspace root)
        npm install "$GITHUB_WORKSPACE"/limbicdb-*.tgz
        
        # Test that the package works
        cat > test-runtime.js << 'EOF'
        const { open } = require('limbicdb')
        const { rmSync } = require('node:fs')
        
        async function test() {
          const testFile = './runtime-test.limbic'
          const testContent = 'Runtime compatibility test - ' + Date.now()
          
          // Phase 1: Write data
          const memory1 = open(testFile)
          try {
            await memory1.remember(testContent)
            const result1 = await memory1.recall('compatibility')
            console.log('Phase 1 - Write passed:', result1.memories.length > 0)
          } finally {
            await memory1.close()
          }
          
          // Phase 2: Reopen and verify persistence
          const memory2 = open(testFile)
          try {
            const result2 = await memory2.recall('compatibility')
            const found = result2.memories.some(mem => mem.content.includes('Runtime compatibility test'))
            console.log('Phase 2 - Persistence verified:', found)
            if (!found) {
              throw new Error('Data not persisted after reopen')
            }
            console.log('Runtime test passed for Node.js', process.version)
          } finally {
            await memory2.close()
            try { rmSync(testFile, { force: true }) } catch {}
          }
        }
        
        test().catch(err => {
          console.error('Runtime test failed:', err)
          process.exit(1)
        })
        EOF
        node test-runtime.js
    
    - name: Test ESM import
      run: |
        cd /tmp/test-runtime
        cat > test-runtime-esm.mjs << 'EOF'
        import { open } from 'limbicdb'
        import { rmSync } from 'node:fs'
        
        async function test() {
          const testFile = './runtime-test-esm.limbic'
          const testContent = 'ESM runtime test - ' + Date.now()
          
          // Phase 1: Write data
          const memory1 = open(testFile)
          try {
            await memory1.remember(testContent)
            const result1 = await memory1.recall('runtime')
            console.log('Phase 1 - Write passed:', result1.memories.length > 0)
          } finally {
            await memory1.close()
          }
          
          // Phase 2: Reopen and verify persistence
          const memory2 = open(testFile)
          try {
            const result2 = await memory2.recall('runtime')
            const found = result2.memories.some(mem => mem.content.includes('ESM runtime test'))
            console.log('Phase 2 - Persistence verified:', found)
            if (!found) {
              throw new Error('Data not persisted after reopen')
            }
            console.log('ESM runtime test passed for Node.js', process.version)
          } finally {
            await memory2.close()
            try { rmSync(testFile, { force: true }) } catch {}
          }
        }
        
        test().catch(err => {
          console.error('ESM runtime test failed:', err)
          process.exit(1)
        })
        EOF
        node test-runtime-esm.mjs

  publish-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, test-runtime-compatibility]
    
    steps:
    - uses: actions/checkout@v5
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v5
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Check version consistency
      run: |
        # Check that package.json version matches CHANGELOG
        PACKAGE_VERSION=$(node -p "require('./package.json').version")
        echo "Package version: $PACKAGE_VERSION"
        
        # Check if CHANGELOG has this version (supports both formats)
        if grep -q "\[$PACKAGE_VERSION\]" CHANGELOG.md || grep -q "## $PACKAGE_VERSION" CHANGELOG.md; then
          echo "✓ CHANGELOG contains version $PACKAGE_VERSION"
        else
          echo "✗ CHANGELOG missing version $PACKAGE_VERSION"
          echo "Please update CHANGELOG.md with release notes for $PACKAGE_VERSION"
          exit 1
        fi
        
        # Check README for any placeholder text
        if grep -q "TODO\|FIXME\|XXX" README.md; then
          echo "✗ README contains placeholder text"
          grep -n "TODO\|FIXME\|XXX" README.md
          exit 1
        fi
        
        echo "✓ Version consistency check passed"
    
    - name: Check documentation consistency
      run: npm run check:docs
